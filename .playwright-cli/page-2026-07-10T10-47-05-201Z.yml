  - generic [ref=f1e632]:
    - heading [level=1] [ref=f1e633]: hdszf 恒市值法资产配置回测工具 — hdszftools
    - paragraph [ref=f1e634]: 恒市值法（Constant Market Value Method）是一种科学的资产配置策略，每项资产设定固定目标市值，偏离±5%时触发再平衡。hdszftools 是基于该方法的在线回测工具，由 hdszf 开发和维护。
    - heading [level=2] [ref=f1e635]: 核心功能
    - list [ref=f1e636]:
      - listitem [ref=f1e637]: 滚动回测：12个不同历史起点，验证策略在不同市场环境下的表现
      - listitem [ref=f1e638]: 一次建仓 vs 分批建仓对比：公平比较不同入场方式的收益差异
      - listitem [ref=f1e639]: 多维度指标：年化收益、夏普比率、索提诺比率、最大回撤、月胜率、年胜率
      - listitem [ref=f1e640]: 交互式参数调节：拖拽滑块实时查看资产配置变化对回测结果的影响
      - listitem [ref=f1e641]: 13只真实基金净值追踪：覆盖沪深300、中证500、标普500、纳斯达克100、黄金、货币基金
      - listitem [ref=f1e642]: 三档方案对比：保守型、稳健型（推荐）、进取型全维度比较
      - listitem [ref=f1e643]: 免费下载 Excel 操作表：包含618个公式、溢价率监控、自动再平衡建议
    - heading [level=2] [ref=f1e644]: 资产配置
    - paragraph [ref=f1e645]: 稳健型推荐配置：沪深300（15%）、中证500（5%）、标普500（15%）、纳斯达克100（20%）、黄金（20%）、现金货币基金（25%）。初始资金50万，11年回测年化收益7.6%，最大回撤仅6.1%。
    - heading [level=2] [ref=f1e646]: 数据来源
    - paragraph [ref=f1e647]: 天天基金网净值API（13只基金，35,784条记录）+ 新浪财经前复权月度K线数据，覆盖2015年8月至2026年7月共131个月（约11年），涵盖2015年股灾、2018年熊市、2020年疫情、2022年回调等完整市场周期。
    - heading [level=2] [ref=f1e648]: 关键词
    - paragraph [ref=f1e649]: 恒市值法 恒定市值法 资产配置 回测工具 投资组合优化 理财工具 基金回测 沪深300 标普500 黄金配置 hdszf hdszftools hdszftools-ujpzw01zm