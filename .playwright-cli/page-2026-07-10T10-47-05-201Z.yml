      - heading "恒市值法的核心逻辑" [level=2] [ref=f1e66]
      - paragraph [ref=f1e67]: 一种纪律严明的资产配置策略，通过定期再平衡实现被动择时
    - generic [ref=f1e68]:
      - generic [ref=f1e69]:
        - generic [ref=f1e70]: ⚖️
        - heading "恒定目标市值" [level=3] [ref=f1e71]
        - paragraph [ref=f1e72]:
          - text: 设定每类资产的
          - strong [ref=f1e73]: 目标市值
          - text: （而非目标比例），每月检查偏离度。当某类资产上涨超出阈值，自动卖出获利部分；下跌时则补仓买入，实现"低买高卖"的纪律性操作。
      - generic [ref=f1e74]:
        - generic [ref=f1e75]: 🏗️
        - heading "分批建仓机制" [level=3] [ref=f1e76]
        - paragraph [ref=f1e77]:
          - text: 初始资金不一次性投入，而是按
          - strong [ref=f1e78]: 月度等额
          - text: 逐步建仓（默认12个月）。避免在极端高点全仓买入，降低择时风险，让成本均匀分布在市场周期中。
      - generic [ref=f1e79]:
        - generic [ref=f1e80]: 🎯
        - heading "再平衡阈值" [level=3] [ref=f1e81]
        - paragraph [ref=f1e82]:
          - text: 设置
          - strong [ref=f1e83]: ±5%偏离阈值
          - text: ，只有当实际比例与目标比例偏差超过阈值时才触发交易。避免频繁小额调仓，降低交易成本，同时保留足够的灵活性应对市场变化。
